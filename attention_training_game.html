<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注意機能トレーニング｜二重課題ゲーム</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep:    #050510;
      --bg-panel:   #0c0c28;
      --lane-bg:    #0a0a20;
      --accent-tgt: #22d3ee;  /* ターゲット: シアン */
      --accent-noi: #f43f5e;  /* ノイズ: ローズ */
      --accent-hit: #4ade80;  /* 正解フィードバック: グリーン */
      --text-main:  #e2e8f0;
      --text-dim:   #64748b;
      --gold:       #fbbf24;
    }

    body {
      background: var(--bg-deep);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--text-main);
      overflow: hidden;
    }

    /* ===================== ゲームラッパー ===================== */
    #gameWrapper {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 24px;
    }

    /* ===================== 右サイドパネル ===================== */
    #sidePanel {
      width: 180px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      font-size: 13px;
    }
    .panel-card {
      background: var(--bg-panel);
      border: 1px solid #1e1e4a;
      border-radius: 10px;
      padding: 12px 14px;
    }
    .panel-card h3 {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      border-bottom: 1px solid #1e1e3a;
      font-size: 12px;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-val { font-weight: 700; color: var(--accent-tgt); font-family: 'Orbitron', monospace; font-size: 11px; }
    .stat-val.bad  { color: var(--accent-noi); }
    .stat-val.warn { color: var(--gold); }

    /* 難易度バー */
    .level-bar-wrap { margin-top: 6px; }
    .level-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 11px; color: var(--text-dim); }
    .level-bar-bg { height: 8px; background: #1e1e3a; border-radius: 4px; overflow: hidden; }
    .level-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s ease, background 0.5s;
      background: var(--accent-tgt);
    }

    /* 操作説明 */
    .key-hint { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
    .key-badge {
      background: #1e2050;
      border: 1px solid #3a3a6a;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      min-width: 40px;
      text-align: center;
      flex-shrink: 0;
    }

    /* ===================== キャンバス ===================== */
    #gameCanvas {
      display: block;
      border: 1px solid #1e1e4a;
      border-radius: 12px;
      box-shadow: 0 0 40px #1a1aff22, 0 0 2px #3a3aff88;
    }

    /* ===================== オーバーレイ ===================== */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 5, 16, 0.92);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      gap: 20px;
      backdrop-filter: blur(4px);
    }
    #overlay.hidden { display: none; }

    .overlay-title {
      font-family: 'Orbitron', monospace;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 0.05em;
      background: linear-gradient(90deg, var(--accent-tgt), #818cf8, var(--accent-tgt));
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s infinite linear;
    }
    @keyframes shimmer { to { background-position: 200% center; } }

    .overlay-desc {
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
      line-height: 1.9;
      max-width: 380px;
    }
    .overlay-desc strong { color: var(--text-main); }

    .stim-legend {
      display: flex;
      gap: 20px;
      margin: 4px 0;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .legend-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .legend-dot.tgt { background: var(--accent-tgt); color: #000; }
    .legend-dot.noi { background: var(--accent-noi); color: #fff; border-radius: 4px; }

    .btn {
      padding: 11px 28px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px #0006; }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: linear-gradient(135deg, #2563eb, #7c3aed); color: #fff; }
    .btn-secondary { background: #1e2050; color: var(--text-main); border: 1px solid #3a3a6a; }

    /* 結果画面 */
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 20px;
      background: var(--bg-panel);
      border: 1px solid #1e1e4a;
      border-radius: 12px;
      padding: 20px 28px;
      min-width: 300px;
      font-size: 13px;
    }
    .result-item { display: flex; flex-direction: column; gap: 2px; }
    .result-label { color: var(--text-dim); font-size: 11px; }
    .result-val { font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 700; }
    .result-val.good { color: var(--accent-hit); }
    .result-val.bad  { color: var(--accent-noi); }
    .result-val.warn { color: var(--gold); }
    .result-score {
      grid-column: 1/-1;
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      color: var(--gold);
      border-top: 1px solid #1e1e4a;
      padding-top: 12px;
      margin-top: 4px;
    }
    .diff-history { grid-column: 1/-1; font-size: 11px; color: var(--text-dim); word-break: break-all; }
    .btn-row { display: flex; gap: 12px; }
  </style>
</head>
<body>

<div id="gameWrapper">
  <!-- ゲームキャンバス -->
  <canvas id="gameCanvas" width="400" height="640"></canvas>

  <!-- 右サイドパネル（リアルタイム統計） -->
  <div id="sidePanel">

    <div class="panel-card">
      <h3>📊 リアルタイム</h3>
      <div class="stat-row"><span>正答</span><span class="stat-val" id="stat-hits">0</span></div>
      <div class="stat-row"><span>誤反応</span><span class="stat-val bad" id="stat-fa">0</span></div>
      <div class="stat-row"><span>見逃し</span><span class="stat-val warn" id="stat-miss">0</span></div>
      <div class="stat-row"><span>衝突</span><span class="stat-val bad" id="stat-coll">0</span></div>
      <div class="stat-row"><span>平均RT</span><span class="stat-val" id="stat-rt">--ms</span></div>
    </div>

    <div class="panel-card">
      <h3>🎚 難易度</h3>
      <div class="level-bar-wrap">
        <div class="level-label">
          <span>Lv.<span id="lv-num">2</span></span>
          <span id="lv-label">やや易しい</span>
        </div>
        <div class="level-bar-bg">
          <div class="level-bar-fill" id="lv-bar" style="width:40%"></div>
        </div>
      </div>
    </div>

    <div class="panel-card">
      <h3>🎮 操作方法</h3>
      <div class="key-hint"><span class="key-badge">←→</span><span>レーン移動</span></div>
      <div class="key-hint"><span class="key-badge">SPACE</span><span>ターゲット反応</span></div>
    </div>

    <div class="panel-card">
      <h3>🔵🔴 刺激の種類</h3>
      <div class="legend-item" style="margin-bottom:8px">
        <div class="legend-dot tgt">★</div>
        <span style="font-size:12px"><strong>青い丸</strong><br>スペースを押す</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot noi">✕</div>
        <span style="font-size:12px"><strong>赤い四角</strong><br>無視する</span>
      </div>
    </div>

  </div>
</div>

<!-- ===================== オーバーレイ（スタート画面/結果画面） ===================== -->
<div id="overlay">
  <div class="overlay-title">🧠 ATTENTION TRAINER</div>
  <p class="overlay-desc">
    3つのレーンを左右に移動して障害物を避けながら、<br>
    画面上部に出る刺激に正確に反応しましょう。<br><br>
    <strong>青い丸（ターゲット）→ スペースキーを押す</strong><br>
    <strong>赤い四角（ノイズ）→ 無視する（押さない）</strong><br><br>
    成績に応じて自動で難易度が変わります。
  </p>
  <div class="stim-legend">
    <div class="legend-item">
      <div class="legend-dot tgt">★</div>
      <span>ターゲット<br><small>→ SPACE</small></span>
    </div>
    <div class="legend-item">
      <div class="legend-dot noi">✕</div>
      <span>ノイズ<br><small>→ 無視</small></span>
    </div>
  </div>
  <button class="btn btn-primary" id="startBtn">ゲームスタート</button>
</div>

<script>
"use strict";
// ================================================================
//  定数
// ================================================================
const C = {
  W: 400,           // キャンバス幅
  H: 640,           // キャンバス高さ
  STIM_H: 108,      // 刺激表示エリアの高さ
  LANE_N: 3,        // レーン数
  LANE_W: 100,      // レーン幅（px）
  ROAD_L: 50,       // 道路左端X（(400 - 300) / 2）
  ROAD_R: 350,      // 道路右端X
  OBS_W: 76,        // 障害物幅
  OBS_H: 28,        // 障害物高さ
  PLR_W: 52,        // プレイヤー幅
  PLR_H: 46,        // プレイヤー高さ
  PLR_Y: 560,       // プレイヤーY中心
  DURATION_MS: 3 * 60 * 1000, // ゲーム時間（3分）
};
// レーン中心X座標
const LANE_CX = [
  C.ROAD_L + C.LANE_W * 0 + C.LANE_W / 2,  // 100
  C.ROAD_L + C.LANE_W * 1 + C.LANE_W / 2,  // 200
  C.ROAD_L + C.LANE_W * 2 + C.LANE_W / 2,  // 300
];

// ================================================================
//  ユーティリティ
// ================================================================
/** 角丸矩形（roundRect の互換実装）*/
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ================================================================
//  AdaptiveDifficulty  ─  アダプティブ難易度管理
// ================================================================
class AdaptiveDifficulty {
  constructor() {
    this.level = 2;           // 現在の難易度（1〜5）
    this.recentEvents = [];   // 直近イベント配列
    this.windowMs = 30_000;   // 評価ウィンドウ（30秒）
    this.lastAdjustAt = Date.now();
    this.cooldownMs   = 12_000; // 最低12秒ごとに評価
    /** 難易度推移ログ [{timeSec, level}] */
    this.history = [{ timeSec: 0, level: 2 }];
  }

  /** 難易度別パラメータ */
  get cfg() {
    /* scrollSpd: px/frame  obsInterval: ms  stimInterval: ms(gap) stimDur: ms  noiseRate: 0〜1 */
    return [
      { scrollSpd: 1.8, obsInterval: 3400, stimInterval: 4200, stimDur: 2200, noiseRate: 0.28 },
      { scrollSpd: 2.6, obsInterval: 2800, stimInterval: 3600, stimDur: 2000, noiseRate: 0.33 },
      { scrollSpd: 3.6, obsInterval: 2200, stimInterval: 3000, stimDur: 1700, noiseRate: 0.40 },
      { scrollSpd: 4.6, obsInterval: 1700, stimInterval: 2400, stimDur: 1450, noiseRate: 0.46 },
      { scrollSpd: 5.8, obsInterval: 1250, stimInterval: 1900, stimDur: 1200, noiseRate: 0.52 },
    ][this.level - 1];
  }

  /** イベントを登録（type: 'hit' | 'miss' | 'falseAlarm'） */
  addEvent(type, rt = null) {
    this.recentEvents.push({ t: Date.now(), type, rt });
  }

  /**
   * 難易度を評価・調整する
   * @param {number} elapsedMs  - ゲーム経過時間（ms）
   * @returns {boolean} 難易度変更があったかどうか
   */
  adjust(elapsedMs) {
    const now = Date.now();
    if (now - this.lastAdjustAt < this.cooldownMs) return false;

    // ウィンドウ外のイベントを除去
    const cutoff = now - this.windowMs;
    this.recentEvents = this.recentEvents.filter(e => e.t > cutoff);

    const hits = this.recentEvents.filter(e => e.type === 'hit').length;
    const misses= this.recentEvents.filter(e => e.type === 'miss').length;
    const fas  = this.recentEvents.filter(e => e.type === 'falseAlarm').length;
    const total = hits + misses + fas;
    if (total < 4) { this.lastAdjustAt = now; return false; } // サンプル不足

    const accuracy = hits / total;
    const rts = this.recentEvents.filter(e => e.rt != null).map(e => e.rt);
    const avgRt = rts.length ? rts.reduce((a, b) => a + b, 0) / rts.length : 999;

    let changed = false;
    if (accuracy >= 0.78 && avgRt <= 680 && this.level < 5) {
      // 成績良好 → 難易度アップ
      this.level++;
      changed = true;
    } else if ((accuracy < 0.42 || avgRt > 1150) && this.level > 1) {
      // 成績不振 → 難易度ダウン
      this.level--;
      changed = true;
    }

    if (changed) {
      this.history.push({ timeSec: Math.floor(elapsedMs / 1000), level: this.level });
    }
    this.lastAdjustAt = now;
    return changed;
  }
}

// ================================================================
//  Logger  ─  ゲームログ記録・CSV出力
// ================================================================
class Logger {
  constructor() {
    /** @type {Array<{t:number, type:string, rt?:number, level?:number}>} */
    this.events = [];
  }

  /** イベントを記録 */
  log(type, extras = {}) {
    this.events.push({ t: Date.now(), type, ...extras });
  }

  /** 統計サマリーを計算して返す */
  getSummary(elapsedMs, diffHistory) {
    const hits      = this.events.filter(e => e.type === 'hit');
    const misses    = this.events.filter(e => e.type === 'miss');
    const fas       = this.events.filter(e => e.type === 'falseAlarm');
    const colls     = this.events.filter(e => e.type === 'collision');
    const rts       = hits.map(e => e.rt).filter(r => r != null);
    const avgRt     = rts.length ? Math.round(rts.reduce((a,b)=>a+b,0)/rts.length) : 0;
    const diffStr   = diffHistory.map(d=>`Lv${d.level}@${d.timeSec}s`).join(' → ');
    return {
      playTimeSec:  Math.floor(elapsedMs / 1000),
      hits:         hits.length,
      falseAlarms:  fas.length,
      misses:       misses.length,
      collisions:   colls.length,
      avgRt,
      diffStr,
    };
  }

  /**
   * CSVを生成してダウンロードする
   * @param {object} summary - getSummary() の戻り値
   * @param {number} score   - 最終スコア
   */
  downloadCSV(summary, score) {
    const rows = [
      ['■ サマリー', ''],
      ['項目', '値'],
      ['プレイ時間(秒)',    summary.playTimeSec],
      ['ターゲット正答数', summary.hits],
      ['誤反応数（衝動反応）', summary.falseAlarms],
      ['ターゲット見逃し数',   summary.misses],
      ['障害物衝突数',     summary.collisions],
      ['平均反応時間(ms)', summary.avgRt],
      ['難易度推移',       summary.diffStr],
      ['最終スコア',       score],
      [],
      ['■ 詳細イベントログ'],
      ['時刻(ms)', 'イベント種別', '反応時間(ms)', '難易度'],
      ...this.events.map(e => [
        e.t,
        e.type,
        e.rt  != null ? e.rt  : '',
        e.level != null ? e.level : '',
      ]),
    ];
    const csv = rows.map(r => r.join(',')).join('\r\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `attention_log_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }
}

// ================================================================
//  Obstacle  ─  障害物
// ================================================================
class Obstacle {
  /**
   * @param {number} lane  - レーン番号（0〜2）
   * @param {number} speed - 落下速度（px/frame）
   */
  constructor(lane, speed) {
    this.lane  = lane;
    this.x     = LANE_CX[lane] - C.OBS_W / 2;
    this.y     = C.STIM_H - C.OBS_H;  // 刺激エリア直下からスタート
    this.speed = speed;
    this.alive = true;
  }

  update() { this.y += this.speed; }

  isOffScreen() { return this.y > C.H + 10; }

  /**
   * プレイヤーとの衝突判定（AABB）
   * @param {{lane:number}} player
   */
  collidesWith(player) {
    const px = LANE_CX[player.lane] - C.PLR_W / 2;
    const py = C.PLR_Y - C.PLR_H / 2;
    return (
      this.x < px + C.PLR_W &&
      this.x + C.OBS_W > px &&
      this.y < py + C.PLR_H &&
      this.y + C.OBS_H > py
    );
  }

  /** 障害物を描画する */
  draw(ctx) {
    ctx.save();
    // グロー
    ctx.shadowColor = '#8888cc66';
    ctx.shadowBlur  = 10;
    // 本体
    ctx.fillStyle   = '#3a3a6e';
    ctx.strokeStyle = '#7070bb';
    ctx.lineWidth   = 1.5;
    roundRect(ctx, this.x, this.y, C.OBS_W, C.OBS_H, 5);
    ctx.fill();
    ctx.stroke();
    // アイコン
    ctx.shadowBlur = 0;
    ctx.fillStyle  = '#aaaadd';
    ctx.font       = 'bold 14px Arial';
    ctx.textAlign  = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⚠', this.x + C.OBS_W / 2, this.y + C.OBS_H / 2 + 1);
    ctx.restore();
  }
}

// ================================================================
//  Stimulus  ─  刺激（ターゲット / ノイズ）
// ================================================================
class Stimulus {
  /**
   * @param {boolean} isTarget  - true: ターゲット（青）/ false: ノイズ（赤）
   * @param {number}  durationMs
   */
  constructor(isTarget, durationMs) {
    this.isTarget   = isTarget;
    this.durationMs = durationMs;
    this.startAt    = Date.now();
    this.responded  = false; // 反応済みフラグ
    this.expired    = false; // 期限切れフラグ
  }

  /** 経過時間（ms） */
  get age() { return Date.now() - this.startAt; }

  /** 残り時間の割合（0→1） */
  get progress() { return Math.min(this.age / this.durationMs, 1); }

  update() {
    if (this.age >= this.durationMs) this.expired = true;
  }

  /**
   * 刺激エリアを描画する
   * @param {CanvasRenderingContext2D} ctx
   */
  draw(ctx) {
    const cx = C.W / 2;
    const cy = C.STIM_H / 2 + 6;
    const R  = 26; // シンボル半径

    // ── タイマーバー ──
    const bW = 180, bH = 6, bX = cx - bW / 2, bY = C.STIM_H - 14;
    // 背景
    ctx.fillStyle = '#1e1e40';
    roundRect(ctx, bX, bY, bW, bH, 3);
    ctx.fill();
    // 残量
    const remain = 1 - this.progress;
    ctx.fillStyle = this.isTarget ? '#22d3ee' : '#f43f5e';
    if (remain > 0) {
      roundRect(ctx, bX, bY, bW * remain, bH, 3);
      ctx.fill();
    }

    // ── シンボル ──
    ctx.save();
    if (this.isTarget) {
      // ターゲット: 発光する青い円 + ★
      ctx.shadowColor = '#22d3ee';
      ctx.shadowBlur  = 24;
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.fillStyle = '#0e7490';
      ctx.fill();
      ctx.strokeStyle = '#67e8f9';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle  = '#fff';
      ctx.font = 'bold 22px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('★', cx, cy + 1);
    } else {
      // ノイズ: 発光する赤い四角 + ✕
      ctx.shadowColor = '#f43f5e';
      ctx.shadowBlur  = 24;
      ctx.fillStyle   = '#9f1239';
      roundRect(ctx, cx - R, cy - R, R * 2, R * 2, 5);
      ctx.fill();
      ctx.strokeStyle = '#fb7185';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle  = '#fff';
      ctx.font = 'bold 24px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✕', cx, cy + 1);
    }
    ctx.restore();

    // ── ラベル ──
    ctx.fillStyle = this.isTarget ? '#67e8f9' : '#fb7185';
    ctx.font = 'bold 11px "Noto Sans JP", Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(
      this.isTarget ? '← TARGET → SPACE キー！' : '← NOISE → 無視！',
      cx, cy + R + 16
    );
  }
}

// ================================================================
//  Player  ─  プレイヤー
// ================================================================
class Player {
  constructor() {
    this.lane      = 1;            // 現在のレーン（0〜2）
    this.drawX     = LANE_CX[1];  // 描画X（スムーズ補間用）
    this.isHit     = false;        // 衝突フラッシュ中
    this.hitTimer  = 0;
    this.invincible  = false;      // 無敵時間
    this.invinTimer  = 0;
    this.thrusterAnim = 0;         // スラスター炎アニメ用カウンタ
  }

  moveLeft()  { if (this.lane > 0) this.lane--; }
  moveRight() { if (this.lane < C.LANE_N - 1) this.lane++; }

  /** 衝突処理（無敵時間付き） */
  triggerHit() {
    if (this.invincible) return false;
    this.isHit    = true;
    this.hitTimer = 350;
    this.invincible = true;
    this.invinTimer = 1500;
    return true;
  }

  update(dt) {
    // X座標を目標レーンへ補間（イージング）
    const targetX = LANE_CX[this.lane];
    this.drawX += (targetX - this.drawX) * Math.min(1, 0.22 * (dt / 16));

    if (this.isHit   ) { this.hitTimer  -= dt; if (this.hitTimer   <= 0) this.isHit    = false; }
    if (this.invincible) { this.invinTimer -= dt; if (this.invinTimer <= 0) this.invincible = false; }

    this.thrusterAnim += dt;
  }

  /**
   * プレイヤーを描画する（宇宙船風シルエット）
   * @param {CanvasRenderingContext2D} ctx
   * @param {number} ts - requestAnimationFrame タイムスタンプ（点滅用）
   */
  draw(ctx, ts) {
    // 無敵時に点滅（100msごとに交互）
    if (this.invincible && Math.floor(ts / 90) % 2 === 1) return;

    const cx = this.drawX;
    const cy = C.PLR_Y;
    const hw = C.PLR_W / 2;
    const hh = C.PLR_H / 2;

    ctx.save();

    // ── スラスター炎 ──
    const flameH = 12 + Math.sin(this.thrusterAnim * 0.02) * 5;
    const flameGrad = ctx.createLinearGradient(cx, cy + hh, cx, cy + hh + flameH + 4);
    flameGrad.addColorStop(0, '#60a5fa');
    flameGrad.addColorStop(0.5, '#818cf8');
    flameGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = flameGrad;
    ctx.beginPath();
    ctx.moveTo(cx - 12, cy + hh);
    ctx.lineTo(cx + 12, cy + hh);
    ctx.lineTo(cx, cy + hh + flameH + 4);
    ctx.closePath();
    ctx.fill();

    // ── 本体グロー ──
    ctx.shadowColor = this.isHit ? '#f43f5e' : '#22d3ee';
    ctx.shadowBlur  = this.isHit ? 20 : 12;

    // 本体（矢印型 / 三角形ベース）
    ctx.fillStyle = this.isHit ? '#f87171' : '#0e7490';
    ctx.beginPath();
    ctx.moveTo(cx,      cy - hh);       // 先端
    ctx.lineTo(cx + hw, cy + hh - 8);  // 右翼後端
    ctx.lineTo(cx + 10, cy + hh - 4);  // 内凹み右
    ctx.lineTo(cx,      cy + hh);       // 底中央
    ctx.lineTo(cx - 10, cy + hh - 4);  // 内凹み左
    ctx.lineTo(cx - hw, cy + hh - 8);  // 左翼後端
    ctx.closePath();
    ctx.fill();

    // ハイライト（表面の光沢感）
    ctx.shadowBlur = 0;
    ctx.fillStyle  = this.isHit ? '#fca5a5' : '#67e8f9';
    ctx.beginPath();
    ctx.moveTo(cx,     cy - hh + 4);
    ctx.lineTo(cx + 6, cy + 4);
    ctx.lineTo(cx - 6, cy + 4);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }
}

// ================================================================
//  FeedbackMessage  ─  フィードバックテキスト（浮き上がり）
// ================================================================
class FeedbackMessage {
  /**
   * @param {string} text
   * @param {string} color   - CSS カラー文字列
   * @param {number} x
   * @param {number} y
   * @param {number} lifeMs
   */
  constructor(text, color, x, y, lifeMs = 850) {
    this.text  = text;
    this.color = color;
    this.x     = x;
    this.y     = y;
    this.life  = lifeMs;
    this.maxLife = lifeMs;
  }

  update(dt) {
    this.life -= dt;
    this.y    -= 0.7 * (dt / 16); // 浮き上がり
  }

  draw(ctx) {
    const alpha = Math.max(0, this.life / this.maxLife);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur  = 8;
    ctx.font = 'bold 15px "Noto Sans JP", Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
}

// ================================================================
//  Game  ─  メインゲームクラス
// ================================================================
class Game {
  /** @param {HTMLCanvasElement} canvas */
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx    = canvas.getContext('2d');

    // サブシステム
    this.player     = new Player();
    this.difficulty = new AdaptiveDifficulty();
    this.logger     = new Logger();

    // ゲームオブジェクト
    /** @type {Obstacle[]} */
    this.obstacles = [];
    /** @type {Stimulus|null} */
    this.stimulus  = null;
    /** @type {FeedbackMessage[]} */
    this.feedbacks = [];

    // スコア・タイマー
    this.score        = 0;
    this.startTime    = null;
    this.lastTs       = 0;
    this.running      = false;

    // 刺激・障害物のスポーンタイマー
    this.stimTimer = 2000;  // 最初の刺激まで2秒
    this.obsTimer  = 1500;  // 最初の障害物まで1.5秒

    // 背景スクロール用オフセット
    this.lineOffset = 0;
    this.bgDots     = this._initBgDots();

    // 統計用カウンタ（サイドパネル更新用）
    this.stats = { hits: 0, fa: 0, miss: 0, coll: 0, rtSum: 0, rtCount: 0 };

    // キー入力管理
    this._keyDown = {};
    this._bindKeys();
  }

  // ──────────────────────────────────────────────
  //  背景ドット初期化（星空風）
  // ──────────────────────────────────────────────
  _initBgDots() {
    return Array.from({ length: 40 }, () => ({
      x: Math.random() * C.W,
      y: Math.random() * C.H,
      r: Math.random() * 1.2 + 0.3,
      alpha: Math.random() * 0.4 + 0.1,
    }));
  }

  // ──────────────────────────────────────────────
  //  キー入力バインド
  // ──────────────────────────────────────────────
  _bindKeys() {
    window.addEventListener('keydown', (e) => {
      if (!this.running) return;
      if (this._keyDown[e.code]) return; // キーリピート防止
      this._keyDown[e.code] = true;

      if (e.code === 'ArrowLeft')  this.player.moveLeft();
      if (e.code === 'ArrowRight') this.player.moveRight();
      if (e.code === 'Space') {
        e.preventDefault();
        this._onSpacePress();
      }
    });
    window.addEventListener('keyup', (e) => {
      this._keyDown[e.code] = false;
    });
  }

  // ──────────────────────────────────────────────
  //  スペースキー押下処理
  // ──────────────────────────────────────────────
  _onSpacePress() {
    const stim = this.stimulus;

    // ▸ 刺激がない・反応済み・期限切れ → 空振り誤反応
    if (!stim || stim.responded || stim.expired) {
      this.score -= 3;
      this.stats.fa++;
      this.logger.log('falseAlarm', { level: this.difficulty.level });
      this.difficulty.addEvent('falseAlarm');
      this._addFeedback('空振り -3', '#f43f5e', C.W / 2, C.PLR_Y - 60);
      return;
    }

    const rt = stim.age; // 反応時間（ms）
    stim.responded = true;

    if (stim.isTarget) {
      // ✅ 正答: ターゲットに反応した
      this.score += 10;
      this.stats.hits++;
      this.stats.rtSum   += rt;
      this.stats.rtCount++;
      this.logger.log('hit', { rt, level: this.difficulty.level });
      this.difficulty.addEvent('hit', rt);
      this._addFeedback(`GOOD +10  ${rt}ms`, '#4ade80', C.W / 2, 190);
    } else {
      // ❌ 誤反応: ノイズに反応してしまった（衝動反応）
      this.score -= 5;
      this.stats.fa++;
      this.logger.log('falseAlarm', { rt, level: this.difficulty.level });
      this.difficulty.addEvent('falseAlarm', rt);
      this._addFeedback('ノイズ! -5', '#f43f5e', C.W / 2, 190);
    }
  }

  // ──────────────────────────────────────────────
  //  フィードバックメッセージを追加
  // ──────────────────────────────────────────────
  _addFeedback(text, color, x, y) {
    this.feedbacks.push(new FeedbackMessage(text, color, x, y));
  }

  // ──────────────────────────────────────────────
  //  ゲームスタート
  // ──────────────────────────────────────────────
  start() {
    this.startTime = Date.now();
    this.running   = true;
    requestAnimationFrame(ts => this._loop(ts));
  }

  // ──────────────────────────────────────────────
  //  メインループ
  // ──────────────────────────────────────────────
  _loop(ts) {
    const dt      = this.lastTs ? Math.min(ts - this.lastTs, 50) : 16; // cap 50ms
    this.lastTs   = ts;
    const elapsed = Date.now() - this.startTime;

    if (elapsed >= C.DURATION_MS) {
      this._endGame(elapsed);
      return;
    }

    this._update(dt, elapsed, ts);
    this._draw(ts, elapsed);
    this._updateSidePanel();

    requestAnimationFrame(t => this._loop(t));
  }

  // ──────────────────────────────────────────────
  //  更新処理
  // ──────────────────────────────────────────────
  _update(dt, elapsed, ts) {
    const cfg = this.difficulty.cfg;

    // ── プレイヤー更新 ──
    this.player.update(dt);

    // ── アダプティブ難易度評価 ──
    this.difficulty.adjust(elapsed);

    // ── 背景スクロールオフセット ──
    this.lineOffset = (this.lineOffset + cfg.scrollSpd) % 80;

    // ── 障害物スポーン ──
    this.obsTimer -= dt;
    if (this.obsTimer <= 0) {
      // 前の障害物と同じレーンにならないよう工夫
      const lastLane = this.obstacles.length
        ? this.obstacles[this.obstacles.length - 1].lane : -1;
      let lane;
      do { lane = Math.floor(Math.random() * C.LANE_N); }
      while (lane === lastLane && Math.random() < 0.7);

      this.obstacles.push(new Obstacle(lane, cfg.scrollSpd * 1.15));
      this.obsTimer = cfg.obsInterval + (Math.random() - 0.5) * 400;
    }

    // ── 障害物更新・衝突判定 ──
    this.obstacles = this.obstacles.filter(obs => {
      obs.update();
      // 衝突判定（無敵時間外のみ）
      if (!this.player.invincible && obs.collidesWith(this.player)) {
        const hit = this.player.triggerHit();
        if (hit) {
          this.score -= 8;
          this.stats.coll++;
          this.logger.log('collision', { level: this.difficulty.level });
          this._addFeedback('CRASH -8', '#f43f5e', LANE_CX[this.player.lane], C.PLR_Y - 70);
          return false; // 衝突した障害物を除去
        }
      }
      return !obs.isOffScreen();
    });

    // ── 刺激スポーン（刺激がない間だけカウントダウン） ──
    if (!this.stimulus) {
      this.stimTimer -= dt;
      if (this.stimTimer <= 0) {
        // noiseRate の確率でノイズ、残りはターゲット
        const isTarget = Math.random() > cfg.noiseRate;
        this.stimulus  = new Stimulus(isTarget, cfg.stimDur);
        this.stimTimer = cfg.stimInterval + (Math.random() - 0.5) * 600;
      }
    }

    // ── 刺激更新 ──
    if (this.stimulus) {
      this.stimulus.update();
      if (this.stimulus.expired) {
        // 期限切れ処理
        if (!this.stimulus.responded && this.stimulus.isTarget) {
          // ターゲットを見逃した
          this.score -= 3;
          this.stats.miss++;
          this.logger.log('miss', { level: this.difficulty.level });
          this.difficulty.addEvent('miss');
          this._addFeedback('見逃し -3', '#fbbf24', C.W / 2, 190);
        }
        this.stimulus = null;
      }
    }

    // ── フィードバックメッセージ更新 ──
    this.feedbacks = this.feedbacks.filter(f => {
      f.update(dt);
      return f.life > 0;
    });
  }

  // ──────────────────────────────────────────────
  //  描画処理
  // ──────────────────────────────────────────────
  _draw(ts, elapsed) {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, C.W, C.H);

    this._drawBackground();
    this._drawStimulusArea();
    this._drawRoad();
    this.obstacles.forEach(o => o.draw(ctx));
    this.player.draw(ctx, ts);
    this._drawHUD(elapsed);
    this.feedbacks.forEach(f => f.draw(ctx));
  }

  /** 背景（スペース感） */
  _drawBackground() {
    const ctx = this.ctx;
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, C.W, C.H);
    // 星
    this.bgDots.forEach(d => {
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,200,255,${d.alpha})`;
      ctx.fill();
    });
  }

  /** 刺激エリア（上部パネル） */
  _drawStimulusArea() {
    const ctx = this.ctx;
    // パネル背景
    ctx.fillStyle = '#0a0a1e';
    ctx.fillRect(0, 0, C.W, C.STIM_H);
    // 下境界線（グロー）
    ctx.strokeStyle = '#1e3a5f';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo(0, C.STIM_H);
    ctx.lineTo(C.W, C.STIM_H);
    ctx.stroke();

    if (this.stimulus) {
      this.stimulus.draw(ctx);
    } else {
      // 待機中
      ctx.fillStyle    = '#1e2a4a';
      ctx.font         = '12px "Noto Sans JP", Arial';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('─ 待機中 ─', C.W / 2, C.STIM_H / 2);
    }
  }

  /** 道路・レーン描画 */
  _drawRoad() {
    const ctx = this.ctx;
    const roadY = C.STIM_H;
    const roadH = C.H - roadY;

    // 道路面グラデーション
    const g = ctx.createLinearGradient(C.ROAD_L, 0, C.ROAD_R, 0);
    g.addColorStop(0,   '#0d0d22');
    g.addColorStop(0.5, '#14143a');
    g.addColorStop(1,   '#0d0d22');
    ctx.fillStyle = g;
    ctx.fillRect(C.ROAD_L, roadY, C.ROAD_R - C.ROAD_L, roadH);

    // ── レーン区切りダッシュライン ──
    ctx.strokeStyle = '#2e2e60';
    ctx.lineWidth   = 1.5;
    for (let i = 1; i < C.LANE_N; i++) {
      const lx = C.ROAD_L + C.LANE_W * i;
      const dashLen = 24, gapLen = 20, period = dashLen + gapLen;
      const offset  = this.lineOffset % period;
      ctx.beginPath();
      for (let y = roadY - offset; y < C.H; y += period) {
        ctx.moveTo(lx, Math.max(roadY, y));
        ctx.lineTo(lx, Math.min(C.H, y + dashLen));
      }
      ctx.stroke();
    }

    // 道路端ライン
    ctx.strokeStyle = '#3a3a7a';
    ctx.lineWidth   = 2;
    [[C.ROAD_L, roadY, C.ROAD_L, C.H], [C.ROAD_R, roadY, C.ROAD_R, C.H]].forEach(([x1,y1,x2,y2]) => {
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    });
  }

  /** HUD（スコア・残り時間・難易度インジケーター） */
  _drawHUD(elapsed) {
    const ctx  = this.ctx;
    const remaining = Math.max(0, Math.ceil((C.DURATION_MS - elapsed) / 1000));
    const mm = Math.floor(remaining / 60);
    const ss = String(remaining % 60).padStart(2, '0');

    // スコア
    ctx.save();
    ctx.fillStyle    = '#e2e8f0';
    ctx.font         = 'bold 18px "Orbitron", monospace';
    ctx.textAlign    = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(String(this.score).padStart(5, '0'), C.ROAD_L + 4, C.STIM_H + 6);

    // 残り時間
    const timeColor = remaining <= 30 ? '#f43f5e' : '#e2e8f0';
    ctx.fillStyle   = timeColor;
    ctx.textAlign   = 'right';
    ctx.fillText(`${mm}:${ss}`, C.ROAD_R - 4, C.STIM_H + 6);

    // 無敵中インジケーター
    if (this.player.invincible) {
      ctx.fillStyle    = '#fbbf24aa';
      ctx.font         = 'bold 11px "Noto Sans JP", Arial';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText('無敵中…', LANE_CX[this.player.lane], C.PLR_Y - C.PLR_H / 2 - 4);
    }
    ctx.restore();
  }

  // ──────────────────────────────────────────────
  //  サイドパネル更新（DOM）
  // ──────────────────────────────────────────────
  _updateSidePanel() {
    const avgRt = this.stats.rtCount
      ? Math.round(this.stats.rtSum / this.stats.rtCount) : null;

    document.getElementById('stat-hits').textContent = this.stats.hits;
    document.getElementById('stat-fa').textContent   = this.stats.fa;
    document.getElementById('stat-miss').textContent = this.stats.miss;
    document.getElementById('stat-coll').textContent = this.stats.coll;
    document.getElementById('stat-rt').textContent   = avgRt != null ? `${avgRt}ms` : '--ms';

    const lv   = this.difficulty.level;
    const pct  = (lv / 5) * 100;
    const labels = ['とても易しい', 'やや易しい', '普通', 'やや難しい', 'とても難しい'];
    const colors = ['#4ade80', '#a3e635', '#facc15', '#fb923c', '#f43f5e'];

    document.getElementById('lv-num').textContent   = lv;
    document.getElementById('lv-label').textContent = labels[lv - 1];
    const bar = document.getElementById('lv-bar');
    bar.style.width      = pct + '%';
    bar.style.background = colors[lv - 1];
  }

  // ──────────────────────────────────────────────
  //  ゲーム終了
  // ──────────────────────────────────────────────
  _endGame(elapsed) {
    this.running = false;
    const summary = this.logger.getSummary(elapsed, this.difficulty.history);
    this._showResult(summary);
  }

  /** 結果オーバーレイを表示 */
  _showResult(summary) {
    const overlay = document.getElementById('overlay');

    const scoreHtml = `
      <div class="overlay-title" style="font-size:20px">🎉 ゲーム終了！</div>
      <div class="result-grid">
        <div class="result-item">
          <span class="result-label">⏱ プレイ時間</span>
          <span class="result-val">${summary.playTimeSec}s</span>
        </div>
        <div class="result-item">
          <span class="result-label">⏩ 平均反応時間</span>
          <span class="result-val">${summary.avgRt || '--'}ms</span>
        </div>
        <div class="result-item">
          <span class="result-label">🎯 ターゲット正答</span>
          <span class="result-val good">${summary.hits}回</span>
        </div>
        <div class="result-item">
          <span class="result-label">⚡ 誤反応（衝動）</span>
          <span class="result-val bad">${summary.falseAlarms}回</span>
        </div>
        <div class="result-item">
          <span class="result-label">👁 見逃し</span>
          <span class="result-val warn">${summary.misses}回</span>
        </div>
        <div class="result-item">
          <span class="result-label">💥 障害物衝突</span>
          <span class="result-val bad">${summary.collisions}回</span>
        </div>
        <div class="diff-history">📈 難易度推移: ${summary.diffStr}</div>
        <div class="result-score">SCORE ${this.score}</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="csvBtn">📥 CSVダウンロード</button>
        <button class="btn btn-primary"   id="retryBtn">🔄 もう一度</button>
      </div>
    `;

    overlay.innerHTML = scoreHtml;
    overlay.classList.remove('hidden');

    document.getElementById('csvBtn').addEventListener('click', () => {
      this.logger.downloadCSV(summary, this.score);
    });
    document.getElementById('retryBtn').addEventListener('click', () => {
      location.reload();
    });
  }
}

// ================================================================
//  エントリーポイント
// ================================================================
const canvas = document.getElementById('gameCanvas');
let game = null;

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('hidden');
  game = new Game(canvas);
  game.start();
});
</script>
