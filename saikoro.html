
<style>
  .dice-app { padding: 1.5rem 1rem; text-align: center; font-family: var(--font-sans); }
  .title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 0.5rem; }
  .subtitle { font-size: 14px; color: var(--color-text-secondary); margin: 0 0 1.5rem; }
  .face-selector { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .face-btn {
    width: 44px; height: 44px; border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .face-btn:hover { background: var(--color-background-secondary); transform: scale(1.05); }
  .face-btn.active {
    background: #3C3489; color: #EEEDFE;
    border-color: #3C3489;
  }
  .dice-stage {
    display: flex; justify-content: center; align-items: center;
    height: 200px; margin-bottom: 1.5rem;
    perspective: 600px;
  }
  .dice-wrap {
    width: 120px; height: 120px;
    transform-style: preserve-3d;
    transform: rotateX(0deg) rotateY(0deg);
    transition: transform 0.05s;
    position: relative;
  }
  .dice-face {
    position: absolute; width: 120px; height: 120px;
    background: var(--color-background-primary);
    border: 2px solid #534AB7;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 52px; font-weight: 500; color: var(--color-text-primary);
    box-shadow: inset 0 0 0 1px rgba(83,74,183,0.2);
    backface-visibility: hidden;
  }
  .dice-face.face-front  { transform: translateZ(60px); }
  .dice-face.face-back   { transform: rotateY(180deg) translateZ(60px); }
  .dice-face.face-left   { transform: rotateY(-90deg) translateZ(60px); }
  .dice-face.face-right  { transform: rotateY(90deg) translateZ(60px); }
  .dice-face.face-top    { transform: rotateX(90deg) translateZ(60px); }
  .dice-face.face-bottom { transform: rotateX(-90deg) translateZ(60px); }
  .roll-btn {
    padding: 12px 40px; font-size: 16px; font-weight: 500;
    background: #3C3489; color: #EEEDFE;
    border: none; border-radius: var(--border-radius-lg);
    cursor: pointer; transition: background 0.15s, transform 0.1s;
    margin-bottom: 1.5rem;
  }
  .roll-btn:hover { background: #534AB7; }
  .roll-btn:active { transform: scale(0.97); }
  .roll-btn:disabled { background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: default; }
  .result-area { min-height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .result-num {
    font-size: 48px; font-weight: 500; color: #3C3489;
    opacity: 0; transform: scale(0.7);
    transition: opacity 0.3s, transform 0.3s;
  }
  .result-num.show { opacity: 1; transform: scale(1); }
  .result-label { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
  .history { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 1rem; }
  .hist-chip {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 20px; padding: 4px 12px;
    font-size: 13px; color: var(--color-text-secondary);
  }
  .hist-chip.latest { background: #EEEDFE; border-color: #AFA9EC; color: #3C3489; font-weight: 500; }
</style>

<div class="dice-app">
  <h2 class="title">🎲 サイコロ</h2>
  <p class="subtitle">面の数を選んでください</p>
  <div class="face-selector" id="faceSelector"></div>
  <div class="dice-stage">
    <div class="dice-wrap" id="diceWrap">
      <div class="dice-face face-front" id="faceFront">？</div>
      <div class="dice-face face-back">　</div>
      <div class="dice-face face-left">　</div>
      <div class="dice-face face-right">　</div>
      <div class="dice-face face-top">　</div>
      <div class="dice-face face-bottom">　</div>
    </div>
  </div>
  <button class="roll-btn" id="rollBtn" onclick="rollDice()">ころがす！</button>
  <div class="result-area">
    <div class="result-num" id="resultNum"></div>
    <div class="result-label" id="resultLabel"></div>
  </div>
  <div class="history" id="history"></div>
</div>

<script>
let selectedFaces = 6;
let rolling = false;
let history = [];

const faceSelector = document.getElementById('faceSelector');
for (let f = 3; f <= 8; f++) {
  const btn = document.createElement('button');
  btn.className = 'face-btn' + (f === 6 ? ' active' : '');
  btn.textContent = 'D' + f;
  btn.dataset.faces = f;
  btn.onclick = () => selectFaces(f);
  faceSelector.appendChild(btn);
}

function selectFaces(n) {
  selectedFaces = n;
  document.querySelectorAll('.face-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.faces) === n);
  });
}

const wrap = document.getElementById('diceWrap');
const faceFront = document.getElementById('faceFront');
const resultNum = document.getElementById('resultNum');
const resultLabel = document.getElementById('resultLabel');
const rollBtn = document.getElementById('rollBtn');

function getRandomInt(max) { return Math.floor(Math.random() * max) + 1; }

function rollDice() {
  if (rolling) return;
  rolling = true;
  rollBtn.disabled = true;
  resultNum.classList.remove('show');
  resultLabel.textContent = '';

  const result = getRandomInt(selectedFaces);
  const duration = 1000;
  const fps = 30;
  const frames = (duration / 1000) * fps;
  let frame = 0;

  const interval = setInterval(() => {
    const rx = Math.random() * 720 - 360;
    const ry = Math.random() * 720 - 360;
    const rz = Math.random() * 720 - 360;
    wrap.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg)`;
    const tmp = getRandomInt(selectedFaces);
    faceFront.textContent = tmp;
    frame++;
    if (frame >= frames) {
      clearInterval(interval);
      setTimeout(() => {
        wrap.style.transition = 'transform 0.4s cubic-bezier(0.22,1,0.36,1)';
        wrap.style.transform = 'rotateX(0deg) rotateY(0deg) rotateZ(0deg)';
        faceFront.textContent = result;
        setTimeout(() => {
          wrap.style.transition = 'transform 0.05s';
          resultNum.textContent = result;
          resultNum.classList.add('show');
          resultLabel.textContent = `D${selectedFaces} の結果`;
          rolling = false;
          rollBtn.disabled = false;
          history.unshift({ val: result, faces: selectedFaces });
          if (history.length > 8) history.pop();
          renderHistory();
        }, 450);
      }, 50);
    }
  }, 1000 / fps);
}

function renderHistory() {
  const el = document.getElementById('history');
  el.innerHTML = history.map((h, i) =>
    `<span class="hist-chip ${i === 0 ? 'latest' : ''}">D${h.faces}: <strong>${h.val}</strong></span>`
  ).join('');
}
</script>
