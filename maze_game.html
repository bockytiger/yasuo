<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>壁伸ばし法迷路</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #ffffff;
    --panel: #f5f5f5;
    --border: #cccccc;
    --accent: #222222;
    --accent2: #cc2222;
    --accent3: #2244bb;
    --text: #222222;
    --dim: #888888;
    --cell: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', 'DotGothic16', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }



  #wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  h1 {
    font-family: 'DotGothic16', monospace;
    font-size: 22px;
    letter-spacing: 4px;
    color: #111111;
    text-shadow: none;
  }

  #status-bar {
    display: flex;
    gap: 18px;
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  #status-bar span { color: #111; font-weight: bold; }

  #canvas-container {
    position: relative;
    border: 2px solid #222;
    box-shadow: 4px 4px 0px #222;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    backdrop-filter: blur(2px);
  }

  .overlay h2 {
    font-family: 'DotGothic16', monospace;
    font-size: 28px;
    letter-spacing: 6px;
    color: #111;
    text-shadow: none;
    animation: pulse 2s ease-in-out infinite;
  }

  .overlay.gameover h2 { color: var(--accent2); }
  .overlay.cleared h2 { color: #116622; }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .btn-row { display: flex; gap: 16px; }

  button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 10px 28px;
    border: 2px solid #222;
    background: #fff;
    color: #222;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    box-shadow: 3px 3px 0 #222;
  }

  button:hover {
    background: #222;
    color: #fff;
    box-shadow: none;
    transform: translate(2px, 2px);
  }

  button.danger {
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: 3px 3px 0 var(--accent2);
  }
  button.danger:hover {
    background: var(--accent2);
    color: #fff;
    box-shadow: none;
  }

  #controls {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
    display: flex;
    gap: 20px;
  }

  .key {
    display: inline-block;
    border: 1px solid var(--dim);
    padding: 1px 6px;
    margin: 0 2px;
    font-size: 10px;
    color: var(--text);
  }
</style>
</head>
<body>
<div id="wrapper">
  <header>
    <h1>▓ MAZE ▓</h1>
  </header>

  <div id="status-bar">
    <div>CHECKPOINT: <span id="cp-count">0</span> / 5</div>
    <div>STATUS: <span id="game-status">STANDBY</span></div>
  </div>

  <div id="canvas-container">
    <canvas id="canvas"></canvas>

    <!-- Start screen -->
    <div class="overlay" id="start-overlay">
      <h2>壁伸ばし迷路</h2>
      <p style="font-size:12px;color:#555;letter-spacing:2px;">① ② ③ ④ ⑤ を順番に通ってゴールへ</p>
      <button id="start-btn">▶ スタート</button>
    </div>

    <!-- Game Over screen -->
    <div class="overlay gameover" id="gameover-overlay" style="display:none">
      <h2>GAME OVER</h2>
      <div class="btn-row">
        <button class="danger" id="end-btn">■ 終わる</button>
        <button id="retry-btn">↺ もう一度</button>
      </div>
    </div>

    <!-- Clear screen -->
    <div class="overlay cleared" id="clear-overlay" style="display:none">
      <h2>✦ GOAL ✦</h2>
      <p style="font-size:12px;color:#555;letter-spacing:2px;">全チェックポイント通過！</p>
      <div class="btn-row">
        <button id="clear-retry-btn">↺ もう一度</button>
      </div>
    </div>
  </div>

  <div id="controls">
    <span><span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> 移動</span>
  </div>
</div>

<script>
const CELL = 18;
const COLS = Math.floor(800 / CELL);
const ROWS = Math.floor(600 / CELL);
const W = COLS * CELL, H = ROWS * CELL;

// Colors
const COL = {
  bg:     '#ffffff',
  wall:   '#111111',
  path:   '#ffffff',
  start:  '#22aa66',
  goal:   '#dd2244',
  cp:     '#2255cc',
  cpText: '#ffffff',
  player: '#444444',
  playerGlow: 'rgba(0,0,0,0.2)',
};

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

let maze, start, goal, checkpoints, player, checkpointIndex, gameStarted, gameOver, gameCleared;

// ── 迷路生成（壁伸ばし法・再帰）──────────────────────
function generateMaze() {
  // 再帰が深くなりすぎないようスタックで実装
  const m = Array.from({length: ROWS}, () => new Array(COLS).fill(1));

  function extendWall(r, c) {
    const dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random()-0.5);
    const stack = [[r, c, dirs, 0]];
    while (stack.length) {
      const frame = stack[stack.length - 1];
      const [fr, fc, fdirs, fi] = frame;
      if (fi >= fdirs.length) { stack.pop(); continue; }
      frame[3]++;
      const [dr, dc] = fdirs[fi];
      const nr = fr + dr, nc = fc + dc;
      if (nr >= 1 && nr < ROWS-1 && nc >= 1 && nc < COLS-1 && m[nr][nc] === 1) {
        m[nr][nc] = 0;
        m[fr + Math.sign(dr)][fc + Math.sign(dc)] = 0;
        const newDirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random()-0.5);
        stack.push([nr, nc, newDirs, 0]);
      }
    }
  }

  m[1][1] = 0;
  extendWall(1, 1);
  return m;
}

// ── BFS ──────────────────────────────────────────────
function bfsPath(m, sr, sc) {
  const visited = new Uint8Array(ROWS * COLS);
  const queue = [[sr, sc]];
  const path = [];
  visited[sr * COLS + sc] = 1;
  let head = 0;
  while (head < queue.length) {
    const [r, c] = queue[head++];
    path.push([r, c]);
    for (const [dr, dc] of [[0,1],[1,0],[0,-1],[-1,0]]) {
      const nr = r+dr, nc = c+dc;
      if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && m[nr][nc]===0 && !visited[nr*COLS+nc]) {
        visited[nr*COLS+nc] = 1;
        queue.push([nr, nc]);
      }
    }
  }
  return path;
}

// ── ゲーム初期化 ──────────────────────────────────────
function initGame() {
  maze = generateMaze();
  start = [1, 1];
  const path = bfsPath(maze, 1, 1);
  const step = Math.floor(path.length / 7);
  checkpoints = [1,2,3,4,5].map(i => path[i * step]);
  goal = path[6 * step];
  player = [...start];
  checkpointIndex = 0;
  gameStarted = false;
  gameOver = false;
  gameCleared = false;
  updateStatus();
}

function updateStatus() {
  document.getElementById('cp-count').textContent = checkpointIndex;
  document.getElementById('game-status').textContent =
    !gameStarted ? 'STANDBY' :
    gameOver     ? 'GAME OVER' :
    gameCleared  ? 'CLEARED' : 'RUNNING';
}

// ── 描画 ─────────────────────────────────────────────
function draw() {
  ctx.fillStyle = COL.bg;
  ctx.fillRect(0, 0, W, H);

  // 迷路セル
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.fillStyle = maze[r][c] === 1 ? COL.wall : COL.path;
      ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
    }
  }



  // スタート
  drawCell(start[0], start[1], COL.start, '▶', '#fff');

  // ゴール
  drawCell(goal[0], goal[1], COL.goal, 'G', '#fff');

  // チェックポイント
  const cpLabels = ['①','②','③','④','⑤'];
  checkpoints.forEach(([r, c], i) => {
    const passed = i < checkpointIndex;
    ctx.fillStyle = passed ? '#112233' : COL.cp;
    ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
    ctx.font = `bold ${CELL-4}px "DotGothic16", monospace`;
    ctx.fillStyle = passed ? '#335566' : COL.cpText;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(cpLabels[i], c*CELL + CELL/2, r*CELL + CELL/2);
  });

  // プレイヤー（シンプルな影付き）
  const [pr, pc] = player;
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 4;
  ctx.fillStyle = COL.player;
  ctx.fillRect(pc*CELL+2, pr*CELL+2, CELL-4, CELL-4);
  ctx.shadowBlur = 0;
}

function drawCell(r, c, bg, label, textColor) {
  ctx.fillStyle = bg;
  ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
  ctx.font = `${CELL-4}px "Share Tech Mono", monospace`;
  ctx.fillStyle = textColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, c*CELL + CELL/2, r*CELL + CELL/2);
}

// ── プレイヤー移動 ──────────────────────────────────
function movePlayer(dr, dc) {
  if (!gameStarted || gameOver || gameCleared) return;
  const nr = player[0] + dr, nc = player[1] + dc;
  if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return;
  if (maze[nr][nc] !== 0) return;
  player = [nr, nc];

  if (checkpointIndex < checkpoints.length) {
    const [cr, cc] = checkpoints[checkpointIndex];
    if (nr === cr && nc === cc) {
      checkpointIndex++;
    }
  }

  if (nr === goal[0] && nc === goal[1] && checkpointIndex === checkpoints.length) {
    gameCleared = true;
    document.getElementById('clear-overlay').style.display = 'flex';
  }

  updateStatus();
  draw();
}

// ── キー入力 ─────────────────────────────────────────
const keyMap = {
  ArrowUp:    [-1, 0],
  ArrowDown:  [ 1, 0],
  ArrowLeft:  [ 0,-1],
  ArrowRight: [ 0, 1],
  w: [-1, 0], s: [1, 0], a: [0, -1], d: [0, 1],
};

document.addEventListener('keydown', e => {
  const dir = keyMap[e.key];
  if (dir) {
    e.preventDefault();
    movePlayer(...dir);
  }
});

// ── ボタン ───────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-overlay').style.display = 'none';
  gameStarted = true;
  updateStatus();
  draw();
});

document.getElementById('end-btn').addEventListener('click', () => {
  // 終了 → スタート画面に戻る
  initGame();
  draw();
  document.getElementById('gameover-overlay').style.display = 'none';
  document.getElementById('start-overlay').style.display = 'flex';
});

document.getElementById('retry-btn').addEventListener('click', () => {
  document.getElementById('gameover-overlay').style.display = 'none';
  initGame();
  draw();
  document.getElementById('start-overlay').style.display = 'flex';
});

document.getElementById('clear-retry-btn').addEventListener('click', () => {
  document.getElementById('clear-overlay').style.display = 'none';
  initGame();
  draw();
  document.getElementById('start-overlay').style.display = 'flex';
});

// ── 初回 ─────────────────────────────────────────────
initGame();
draw();
</script>
</body>
</html>
